# ==========================================
# 1. CORE SETTINGS & PREFIX
# ==========================================
set -g default-command "${SHELL}" 

# Unbind default prefix (Ctrl+b) and set it to Ctrl+Space
unbind C-b
set -g prefix C-Space
bind C-Space send-prefix

# Move status bar to the top (cleaner for Vim/Neovim users)
set-option -g status-position top

# ==========================================
# 2. VIM-STYLE KEYBINDINGS
# ==========================================
# Reload tmux config easily: Prefix + r
bind r source-file ~/.tmux.conf \; display-message "Config reloaded!"

# Window Splits (Vim style): Prefix + v (vertical) or Prefix + s (horizontal)
# The -c "#{pane_current_path}" keeps the new pane in your current directory
bind v split-window -h -c "#{pane_current_path}"
bind s split-window -v -c "#{pane_current_path}"

# Quick Window Toggle: Prefix + Tab (bounces between two most recent windows)
bind Tab last-window

# Fast Pane Kill: Prefix + q (closes pane without the "are you sure?" prompt)
bind q kill-pane

# Vim Copy Mode: Prefix + [ to enter scroll mode
set-window-option -g mode-keys vi
bind-key -T copy-mode-vi v send-keys -X begin-selection         # 'v' to highlight
bind-key -T copy-mode-vi C-v send-keys -X rectangle-toggle      # 'Ctrl+v' for block highlight
# bind-key -T copy-mode-vi y send-keys -X copy-selection-and-cancel # 'y' to yank/copy. Prefix + ] to paste
bind-key -T copy-mode-vi y send-keys -X copy-pipe-and-cancel # 'y' to yank/copy. Prefix + ] to paste

# Resize panes using Prefix + H, J, K, L (Hold prefix, tap letters)
bind -r H resize-pane -L 10
bind -r J resize-pane -D 10
bind -r K resize-pane -U 10
bind -r L resize-pane -R 10


# This determines if the current pane is running Vim/Neovim
is_vim="ps -o state= -o comm= -t '#{pane_tty}' \
    | grep -iqE '^[^TXZ ]+ +(\\S+\\/)?g?(view|l?n?vim?x?|fzf)(diff)?$'"

# If it's Vim, send the keystroke to Vim. Otherwise, switch Tmux panes.
bind-key -n 'C-h' if-shell "$is_vim" 'send-keys C-h'  'select-pane -L'
bind-key -n 'C-j' if-shell "$is_vim" 'send-keys C-j'  'select-pane -D'
bind-key -n 'C-k' if-shell "$is_vim" 'send-keys C-k'  'select-pane -U'
bind-key -n 'C-l' if-shell "$is_vim" 'send-keys C-l'  'select-pane -R'

# Allow using Prefix + Ctrl+l to clear the terminal screen (since C-l is now mapped)
bind C-l send-keys 'C-l'


# ==========================================
# 3. CLIPBOARD & OS PORTABILITY
# ==========================================
set -g set-clipboard on

# Auto-detect OS and set the correct clipboard tool for both Tmux and copy-toolkit
if-shell 'uname | grep -q Darwin' \
    'set -g @copytk-copy-command "pbcopy"; set -s copy-command "pbcopy"'
if-shell 'uname | grep -q Linux && [ -n "$WAYLAND_DISPLAY" ]' \
    'set -g @copytk-copy-command "wl-copy"; set -s copy-command "wl-copy"'
if-shell 'uname | grep -q Linux && [ -z "$WAYLAND_DISPLAY" ]' \
    'set -g @copytk-copy-command "xclip -selection clipboard"; set -s copy-command "xclip -selection clipboard"'

# ==========================================
# 4. PLUGINS (Press Prefix + Shift + I to install)
# ==========================================
# Core Plugin Manager
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'       # Sensible default Tmux settings

# Workflow & ML Tooling
set -g @plugin 'christoomey/vim-tmux-navigator'   # Seamless C-h/j/k/l navigation between Vim and Tmux panes
set -g @plugin 'tmux-plugins/tmux-logging'        # Prefix + Shift + p : Save entire pane output to a log file
set -g @plugin 'tmux-plugins/tmux-resurrect'      # Prefix + C-s (save session) / Prefix + C-r (restore)
set -g @plugin 'tmux-plugins/tmux-continuum'      # Auto-saves environment every 15 mins (requires resurrect)
set -g @plugin 'sainnhe/tmux-fzf'                 # Prefix + F : Fuzzy find sessions, windows, and panes
set -g @plugin 'tmux-plugins/tmux-cowboy'         # Prefix + * : Instantly kill the frozen process in current pane
set -g @plugin 'CrispyConductor/tmux-copy-toolkit' # Prefix + S : Advanced easy-copy toolkit

# Auto-restore sessions when Tmux starts
set -g @continuum-restore 'on'

# ==========================================
# 5. ROSE PINE THEME & UI
# ==========================================
set -g @plugin 'rose-pine/tmux'
set -g @rose_pine_variant 'main' # Options are 'main', 'moon' or 'dawn'

# Enable Information Modules
set -g @rose_pine_directory 'on'            # Show current folder
set -g @rose_pine_user 'on'                 # Show username
set -g @rose_pine_host 'on'                 # Show host machine name (crucial for SSH)
set -g @rose_pine_date_time ''              # Show date and time
set -g @rose_pine_show_current_program 'on' # Show active program name
set -g @rose_pine_show_pane_directory 'on'  # Show active directory per pane

# Configure Separators
set -g @rose_pine_left_separator ' > '
set -g @rose_pine_right_separator ' < '
set -g @rose_pine_field_separator ' | '
set -g @rose_pine_window_status_separator "  " 

# Enable Custom Nerd Font Icons
set -g @rose_pine_session_icon ''          # Lightning bolt
set -g @rose_pine_current_window_icon ''   # Window icon
set -g @rose_pine_folder_icon ''           # Folder icon
set -g @rose_pine_username_icon ''         # Profile icon
set -g @rose_pine_date_time_icon '󰃰'        # Clock/Calendar icon

# ==========================================
# 6. AUTO-INSTALLATION & INITIALIZATION
# ==========================================
# Automatically install TPM if it is not installed on a new machine
if "test ! -d ~/.tmux/plugins/tpm" \
   "run 'git clone https://github.com/tmux-plugins/tpm ~/.tmux/plugins/tpm && ~/.tmux/plugins/tpm/bin/install_plugins'"

# Initialize TMUX plugin manager (Keep this at the very bottom!)
run '~/.tmux/plugins/tpm/tpm'
