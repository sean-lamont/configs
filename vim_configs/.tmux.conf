set -g default-command "${SHELL}"
set -g @plugin 'rose-pine/tmux'

unbind C-b
set -g prefix C-Space
bind C-Space send-prefix


# 1. Enable standard clipboard features
set -g set-clipboard on

# For Linux (X11/Standard):
set -g @copytk-copy-command "xclip -selection clipboard"

# For Linux (Wayland):
#set -g @copytk-copy-command "wl-copy"

# For macOS:
#set -g @copytk-copy-command "pbcopy"

# List of plugins
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-cowboy'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'CrispyConductor/tmux-copy-toolkit'

set-option -g @plugin 'b0o/tmux-autoreload'

# Switch panes using Alt-arrow (or Vim hjkl) without prefix
bind -n C-h select-pane -L
bind -n C-l select-pane -R
bind -n C-k select-pane -U
bind -n C-j select-pane -D 
# M for alt/option

# Resize panes using Prefix + H, J, K, L
bind -r H resize-pane -L 10
bind -r J resize-pane -D 10
bind -r K resize-pane -U 10
bind -r L resize-pane -R 10
set -g @plugin 'rose-pine/tmux'

set -g @rose_pine_variant 'main' # Options are 'main', 'moon' or 'dawn'


run '~/.tmux/plugins/tpm/tpm'
